<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Penutup ❤️</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to top, #ffc2d1, #ffe5ec);
      margin-top: 20vh;
    }

    .box {
      background: white;
      padding: 20px;
      width: 85%;
      margin: auto;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .laugh {
      font-size: 40px;
      animation: shake 0.5s infinite;
    }

    @keyframes shake {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      50% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
      100% { transform: rotate(0deg); }
    }

    button {
      padding: 10px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- 🎵 MUSIK -->
  <audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a8b8f4.mp3" type="audio/mp3">
  </audio>

  <button onclick="document.getElementById('music').play()">
    Putar Musik 🎵
  </button>

  <div class="box">
    <h2>Terakhir nih 😆</h2>

    <p>
      Jangan lupa senyum yaaaa adikkkk kecilll 😂❤️<br><br>
      Kamu itu spesial ✨<br><br>
      Aku selalu dukung kamu dan selalu ada buat kamuuu 💕
    </p>

    <div class="laugh">😂😂😂</div>

    <p><b>Dibuat dengan ❤️ oleh Rangga</b></p>

    <a href="index.html">
      <button>Ulang Lagi 🔁</button>
    </a>
  </div>

</body>
</html>
